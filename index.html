<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LLM Batch Caller</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #627282;
      --border: #d9e0e7;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --danger: #b42318;
      --shadow: 0 12px 30px rgba(31, 41, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(100% - 32px, 800px);
      margin: 40px auto;
      padding: 32px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 24px;
      font-size: 2rem;
      line-height: 1.2;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 650;
    }

    .help-text {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    textarea,
    input[type="text"],
    input[type="password"],
    input[type="file"] {
      width: 100%;
      font: inherit;
    }

    textarea,
    input[type="text"],
    input[type="password"] {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 11px 12px;
      color: var(--text);
      background: #fff;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    input[type="file"] {
      padding: 10px 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin: 24px 0 18px;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    #downloadBtn {
      display: none;
      background: #0f766e;
    }

    #downloadBtn:hover {
      background: #115e59;
    }

    #status {
      min-height: 28px;
      margin: 0 0 18px;
      color: var(--muted);
      font-weight: 650;
    }

    #status.error {
      color: var(--danger);
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #eef2f6;
      font-size: 0.92rem;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    td:first-child {
      width: 72px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    td:nth-child(2),
    td:nth-child(3) {
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 560px) {
      main {
        width: min(100% - 20px, 800px);
        margin: 20px auto;
        padding: 20px;
      }

      h1 {
        font-size: 1.65rem;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>LLM Batch Caller</h1>

    <div class="field">
      <label for="systemPrompt">System prompt</label>
      <textarea id="systemPrompt" placeholder="You are a helpful assistant."></textarea>
    </div>

    <div class="field">
      <label for="promptFile">Prompt file (.txt or .csv, one prompt per line)</label>
      <input id="promptFile" type="file" accept=".txt,.csv,text/plain,text/csv">
    </div>

    <div class="field">
      <label for="apiUrl">API URL</label>
      <input id="apiUrl" type="text" value="http://127.0.0.1:1234/v1/chat/completions">
    </div>

    <div class="field">
      <label for="apiKey">API Key</label>
      <input id="apiKey" type="password" value="">
    </div>

    <div class="field">
      <label for="modelName">Model name</label>
      <input
        id="modelName"
        type="text"
        value="qwen3.5-0.8b-mlx:3"
        placeholder="qwen3.5-0.8b-mlx:3, gemini-2.5-flash, meta-llama/llama-3.3-70b-instruct:free"
      >
      <p class="help-text">
        Examples: qwen3.5-0.8b-mlx:3 for LM Studio; gemini-2.5-flash for Google AI Studio; meta-llama/llama-3.3-70b-instruct:free for OpenRouter.
      </p>
    </div>

    <div class="actions">
      <button id="runBtn" type="button">Run</button>
      <button id="downloadBtn" type="button">Download CSV</button>
    </div>

    <div id="status" aria-live="polite">Upload a file to begin.</div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Row</th>
            <th>Original input</th>
            <th>Model response</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </main>

  <script>
    const systemPromptEl = document.getElementById("systemPrompt");
    const promptFileEl = document.getElementById("promptFile");
    const apiUrlEl = document.getElementById("apiUrl");
    const apiKeyEl = document.getElementById("apiKey");
    const modelNameEl = document.getElementById("modelName");
    const runBtn = document.getElementById("runBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const statusEl = document.getElementById("status");
    const resultsBody = document.getElementById("resultsBody");

    let results = [];

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error || new Error("Could not read file."));
        reader.readAsText(file);
      });
    }

    function getPromptLines(text) {
      return text
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter((line) => line.length > 0);
    }

    function addResultRow(rowNumber, input, response) {
      const tr = document.createElement("tr");
      const rowCell = document.createElement("td");
      const inputCell = document.createElement("td");
      const responseCell = document.createElement("td");

      rowCell.textContent = rowNumber;
      inputCell.textContent = input;
      responseCell.textContent = response;

      tr.append(rowCell, inputCell, responseCell);
      resultsBody.appendChild(tr);
    }

    async function callModel(apiUrl, apiKey, systemPrompt, userPrompt, modelName) {
      const headers = {
        "Content-Type": "application/json"
      };

      if (apiKey) {
        headers.Authorization = `Bearer ${apiKey}`;
      }

      const response = await fetch(apiUrl, {
        method: "POST",
        headers,
        body: JSON.stringify({
          model: modelName,
          temperature: 0,
          messages: [
            { role: "system", content: systemPrompt },
            { role: "user", content: userPrompt }
          ]
        })
      });

      const text = await response.text();
      let data = null;

      try {
        data = text ? JSON.parse(text) : null;
      } catch (error) {
        throw new Error(`HTTP ${response.status}: ${text || "Invalid JSON response"}`);
      }

      if (!response.ok) {
        const message = data?.error?.message || data?.message || text || response.statusText;
        throw new Error(`HTTP ${response.status}: ${message}`);
      }

      return data?.choices?.[0]?.message?.content ?? "";
    }

    function escapeCsvField(value) {
      const text = String(value ?? "");
      if (/[",\n\r]/.test(text)) {
        return `"${text.replace(/"/g, '""')}"`;
      }
      return text;
    }

    function buildCsv(rows) {
      const header = ["row number", "original input", "model response"];
      const lines = [
        header.map(escapeCsvField).join(","),
        ...rows.map((row) => [
          row.rowNumber,
          row.input,
          row.response
        ].map(escapeCsvField).join(","))
      ];
      return lines.join("\r\n");
    }

    function downloadCsv() {
      const csv = buildCsv(results);
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = "results.csv";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function runBatch() {
      const file = promptFileEl.files[0];
      const apiUrl = apiUrlEl.value.trim();
      const apiKey = apiKeyEl.value.trim();
      const modelName = modelNameEl.value.trim();
      const systemPrompt = systemPromptEl.value;

      if (!file) {
        setStatus("Choose a .txt or .csv file first.", true);
        return;
      }

      if (!apiUrl) {
        setStatus("Enter an API URL first.", true);
        return;
      }

      if (!modelName) {
        setStatus("Enter a model name first.", true);
        return;
      }

      runBtn.disabled = true;
      downloadBtn.style.display = "none";
      results = [];
      resultsBody.textContent = "";

      try {
        const text = await readFileAsText(file);
        const lines = getPromptLines(text);

        if (lines.length === 0) {
          setStatus("No non-empty lines found in the uploaded file.", true);
          return;
        }

        for (let i = 0; i < lines.length; i += 1) {
          const input = lines[i];
          let modelResponse = "";

          setStatus(`Processing ${i + 1} / ${lines.length}`);

          try {
            modelResponse = await callModel(apiUrl, apiKey, systemPrompt, input, modelName);
          } catch (error) {
            modelResponse = `Error: ${error.message || String(error)}`;
          }

          const result = {
            rowNumber: i + 1,
            input,
            response: modelResponse
          };

          results.push(result);
          addResultRow(result.rowNumber, result.input, result.response);
        }

        setStatus(`Finished processing ${lines.length} / ${lines.length}`);
        downloadBtn.style.display = "inline-block";
      } catch (error) {
        setStatus(error.message || String(error), true);
      } finally {
        runBtn.disabled = false;
      }
    }

    runBtn.addEventListener("click", runBatch);
    downloadBtn.addEventListener("click", downloadCsv);
  </script>
</body>
</html>
